# Neylo pipeline configuration (v1)
# Centralizes tunables for the offline batch pipeline:
# ingest -> decode/segment -> detect -> track -> export

paths:
  data_root: data
  output_root: outputs
  models_root: models

ingest:
  video_extensions: [".mp4", ".mov", ".mkv"]

decode:
  segment_seconds: 90
  fps: null            # null = use source fps
  backend: ffmpeg      # ffmpeg | nvdec (nvdec deferred)

detection:
  # Phase 1 default: nano weights for fast end-to-end iteration. Switch to
  # yolo11m.pt or yolo11x.pt once the pipeline is wired (1.5+) and SAHI
  # is enabled. Bare names like "yolo11n.pt" trigger ultralytics auto-
  # download; pre-stage weights into `models/` and use a path to avoid it.
  model_path: yolo11n.pt
  # v1: single class. Goalkeeper / referee data is too sparse to train
  # reliably; ball is deferred to v2. See PLAN_v2 §3.
  classes: [player]
  imgsz: 1280
  conf: 0.25
  iou: 0.6
  device: cuda:0
  half: true
  sahi:
    enabled: false
    slice_height: 640
    slice_width: 640
    overlap_height_ratio: 0.2
    overlap_width_ratio: 0.2

tracking:
  # The detailed knobs (track buffers, ReID, CMC, etc.) live in
  # configs/botsort.yaml — this file only points at the tracker spec.
  # Phase 5 will tune ReID / CMC; Phase 5 also adds offline tracklet
  # stitching as a separate post-processing stage.
  tracker: botsort
  config_path: configs/botsort.yaml

export:
  parquet:
    compression: snappy
  video:
    enabled: true
    draw_track_id: true
    draw_class: true
    draw_conf: true
    thickness: 2

runtime:
  device: cuda:0
  num_workers: 4
  log_level: INFO
